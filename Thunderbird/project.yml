name: Thunderbird
options:
  bundleIdPrefix: net.thunderbird
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    visionOS: "2.4"
  xcodeVersion: "26.0"
  defaultConfig: Release
  groupSortPosition: none
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.42.0"

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MTL_FAST_MATH: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule

packages:
  Core:
    path: ../Core
  Feature:
    path: ../Feature
  Bolt:
    path: ../Bolt

targets:
  Thunderbird:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Thunderbird
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Thunderbird/Thunderbird.entitlements
        CODE_SIGN_IDENTITY: "Apple Distribution"
        CODE_SIGN_STYLE: Manual
        CURRENT_PROJECT_VERSION: "1"
        DOCC_HOSTING_BASE_PATH: thunderbird-ios
        ENABLE_APP_SANDBOX: YES
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SELECTED_FILES: readonly
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Thunderbird/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UIStatusBarStyle[sdk=iphoneos*]: UIStatusBarStyleDefault
        INFOPLIST_KEY_UIStatusBarStyle[sdk=iphonesimulator*]: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]: "@executable_path/../Frameworks"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.ryantenney.thunderbird
        PRODUCT_NAME: "$(TARGET_NAME)"
        REGISTER_APP_GROUPS: YES
        SDKROOT: auto
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        XROS_DEPLOYMENT_TARGET: "2.4"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: 5532R62J62
        Release:
          DEVELOPMENT_TEAM: 5532R62J62
          DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Core
        product: Core
      - package: Bolt
        product: BoltUI
      - package: Feature
        product: Account
      - package: Feature
        product: JMAP
      - package: Feature
        product: IMAP
      - package: Feature
        product: SMTP
      - package: Feature
        product: Autoconfiguration

  ThunderbirdTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - path: ThunderbirdTests
      - path: Thunderbird/FeatureFlags/Distribution.swift
      - path: Thunderbird/FeatureFlags/FeatureFlags.swift
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Manual
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: net.thunderbird.ThunderbirdTests
        PRODUCT_NAME: "$(TARGET_NAME)"
        SDKROOT: auto
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Thunderbird.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Thunderbird"
        XROS_DEPLOYMENT_TARGET: "2.4"
    dependencies:
      - target: Thunderbird_iOS
        platform: iOS
      - target: Thunderbird_macOS
        platform: macOS
